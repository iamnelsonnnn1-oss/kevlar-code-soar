---
- name: 🛡️ Initialize Kevlar-Code-SOAR Infrastructure
  hosts: soar_instances
  become: yes
  gather_facts: yes

  vars:
    project_name: "kevlar-code-soar"

  roles:
    - docker_engine    # Wave 1: Foundation (Engine & Compose)
    - siem_core        # Wave 2: Brain (ELK Stack)
    # - active_defense # Wave 3: Muscle (Auto-Remediation)

  post_tasks:
    - name: Final Status Check
      debug:
        msg: "Vessel Secured. Kevlar-Code-SOAR is active on {{ ansible_host }}."
